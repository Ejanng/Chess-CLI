<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="660" viewBox="0 0 1100 660"><rect width="1100" height="660" fill="#f6f0e5" /><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.25" /></filter><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#4a4a4a" /></marker><marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2e7d32" /></marker><marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#b3261e" /></marker></defs><rect width="1100" height="660" fill="#f6f0e5" /><text x="550.0" y="40" fill="#2f2417" font-size="22" font-family="Georgia, serif" font-weight="bold" text-anchor="middle">Chess Automaton — DFA Move Validator</text><text x="550.0" y="64" fill="#72614d" font-size="13" font-family="Georgia, serif" font-weight="normal" text-anchor="middle">6-State Deterministic Finite Automaton Pipeline</text><circle cx="90" cy="150" r="42" fill="#e3f2fd" stroke="#1565c0" stroke-width="3" filter="url(#shadow)" /><text x="90" y="144" fill="#2f2417" font-size="15" font-family="Georgia, serif" font-weight="bold" text-anchor="middle">S0</text><text x="90" y="162" fill="#5a4a3a" font-size="11" font-family="Georgia, serif" font-weight="normal" text-anchor="middle">INPUT</text><circle cx="260" cy="150" r="42" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3" filter="url(#shadow)" /><text x="260" y="144" fill="#2f2417" font-size="15" font-family="Georgia, serif" font-weight="bold" text-anchor="middle">S1</text><text x="260" y="162" fill="#5a4a3a" font-size="11" font-family="Georgia, serif" font-weight="normal" text-anchor="middle">BOUNDS</text><circle cx="430" cy="150" r="42" fill="#fff3e0" stroke="#ef6c00" stroke-width="3" filter="url(#shadow)" /><text x="430" y="144" fill="#2f2417" font-size="15" font-family="Georgia, serif" font-weight="bold" text-anchor="middle">S2</text><text x="430" y="162" fill="#5a4a3a" font-size="11" font-family="Georgia, serif" font-weight="normal" text-anchor="middle">PIECE</text><circle cx="600" cy="150" r="42" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="3" filter="url(#shadow)" /><text x="600" y="144" fill="#2f2417" font-size="15" font-family="Georgia, serif" font-weight="bold" text-anchor="middle">S3</text><text x="600" y="162" fill="#5a4a3a" font-size="11" font-family="Georgia, serif" font-weight="normal" text-anchor="middle">RULES</text><circle cx="770" cy="150" r="42" fill="#fce4ec" stroke="#c62828" stroke-width="3" filter="url(#shadow)" /><text x="770" y="144" fill="#2f2417" font-size="15" font-family="Georgia, serif" font-weight="bold" text-anchor="middle">S4</text><text x="770" y="162" fill="#5a4a3a" font-size="11" font-family="Georgia, serif" font-weight="normal" text-anchor="middle">SAFETY</text><circle cx="940" cy="150" r="46" fill="#d4edda" stroke="#2e7d32" stroke-width="2" /><circle cx="940" cy="150" r="42" fill="#d4edda" stroke="#2e7d32" stroke-width="3" filter="url(#shadow)" /><text x="940" y="144" fill="#2f2417" font-size="15" font-family="Georgia, serif" font-weight="bold" text-anchor="middle">S5</text><text x="940" y="162" fill="#5a4a3a" font-size="11" font-family="Georgia, serif" font-weight="normal" text-anchor="middle">ACCEPT</text><circle cx="515.0" cy="340" r="42" fill="#ffebee" stroke="#b3261e" stroke-width="3" filter="url(#shadow)" /><text x="515.0" y="334" fill="#2f2417" font-size="15" font-family="Georgia, serif" font-weight="bold" text-anchor="middle">REJECT</text><text x="515.0" y="352" fill="#5a4a3a" font-size="11" font-family="Georgia, serif" font-weight="normal" text-anchor="middle">Illegal Move</text><line x1="20" y1="150" x2="46" y2="150" stroke="#4a4a4a" stroke-width="2" marker-end="url(#arrowhead)" /><text x="32" y="140" fill="#4a4a4a" font-size="11" font-family="Georgia, serif" font-weight="normal" text-anchor="middle">Start</text><line x1="134" y1="150" x2="216" y2="150" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowhead-green)" /><text x="175.0" y="140" fill="#2e7d32" font-size="10" font-family="Georgia, serif" font-weight="normal" text-anchor="middle">valid format</text><line x1="304" y1="150" x2="386" y2="150" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowhead-green)" /><text x="345.0" y="140" fill="#2e7d32" font-size="10" font-family="Georgia, serif" font-weight="normal" text-anchor="middle">in bounds</text><line x1="474" y1="150" x2="556" y2="150" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowhead-green)" /><text x="515.0" y="140" fill="#2e7d32" font-size="10" font-family="Georgia, serif" font-weight="normal" text-anchor="middle">valid piece</text><line x1="644" y1="150" x2="726" y2="150" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowhead-green)" /><text x="685.0" y="140" fill="#2e7d32" font-size="10" font-family="Georgia, serif" font-weight="normal" text-anchor="middle">valid rules</text><line x1="814" y1="150" x2="896" y2="150" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowhead-green)" /><text x="855.0" y="140" fill="#2e7d32" font-size="10" font-family="Georgia, serif" font-weight="normal" text-anchor="middle">king safe</text><path d="M 90.0 192.0 Q 289.0014601965827 279.9130666945015 488.00292039316537 307.8261333890029" stroke="#b3261e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-red)" /><path d="M 260.0 192.0 Q 380.31757699016094 276.2664549634959 500.6351539803219 300.53290992699186" stroke="#b3261e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-red)" /><path d="M 430.0 192.0 Q 472.5 275.0 515.0 298.0" stroke="#b3261e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-red)" /><path d="M 600.0 192.0 Q 564.6824230098391 276.2664549634959 529.3648460196781 300.53290992699186" stroke="#b3261e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-red)" /><path d="M 770.0 192.0 Q 655.9985398034173 279.9130666945015 541.9970796068346 307.8261333890029" stroke="#b3261e" stroke-width="1.5" fill="none" marker-end="url(#arrowhead-red)" /><rect x="50" y="430" width="1000" height="210" rx="8" ry="8" fill="#fffaf1" stroke="#d7ccc8" stroke-width="1" filter="url(#shadow)" /><text x="70" y="450" fill="#2f2417" font-size="11" font-family="monospace" font-weight="bold" text-anchor="start">STATE DESCRIPTIONS:</text><text x="70" y="468" fill="#4a4a4a" font-size="10" font-family="monospace" font-weight="normal" text-anchor="start">S0 INPUT — Parse algebraic notation</text><text x="70" y="488" fill="#4a4a4a" font-size="10" font-family="monospace" font-weight="normal" text-anchor="start">S1 BOUNDS — Verify coordinates in 8x8 board</text><text x="70" y="508" fill="#4a4a4a" font-size="10" font-family="monospace" font-weight="normal" text-anchor="start">S2 PIECE — Source square has active player's piece</text><text x="70" y="528" fill="#4a4a4a" font-size="10" font-family="monospace" font-weight="normal" text-anchor="start">S3 RULES — Piece geometry, path, captures, castling</text><text x="70" y="548" fill="#4a4a4a" font-size="10" font-family="monospace" font-weight="normal" text-anchor="start">S4 SAFETY — Simulate move; reject if king in check</text><text x="70" y="568" fill="#4a4a4a" font-size="10" font-family="monospace" font-weight="normal" text-anchor="start">S5 ACCEPT — All gates passed; move is legal</text><text x="560.0" y="450" fill="#b3261e" font-size="11" font-family="monospace" font-weight="bold" text-anchor="start">REJECT TRANSITIONS:</text><text x="560.0" y="468" fill="#5a4a3a" font-size="10" font-family="monospace" font-weight="normal" text-anchor="start">S0 -&gt; REJECT : E001 invalid format</text><text x="560.0" y="488" fill="#5a4a3a" font-size="10" font-family="monospace" font-weight="normal" text-anchor="start">S1 -&gt; REJECT : E001 out of bounds</text><text x="560.0" y="508" fill="#5a4a3a" font-size="10" font-family="monospace" font-weight="normal" text-anchor="start">S2 -&gt; REJECT : E002 empty square / E003 wrong color</text><text x="560.0" y="528" fill="#5a4a3a" font-size="10" font-family="monospace" font-weight="normal" text-anchor="start">S3 -&gt; REJECT : E004 illegal move / E005 path blocked</text><text x="560.0" y="544" fill="#5a4a3a" font-size="10" font-family="monospace" font-weight="normal" text-anchor="start">/ E007 self-capture</text><text x="560.0" y="564" fill="#5a4a3a" font-size="10" font-family="monospace" font-weight="normal" text-anchor="start">S4 -&gt; REJECT : E006 king would be in check</text></svg>